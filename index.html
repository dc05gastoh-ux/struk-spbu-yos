<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Ujian Matematika</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f6f9;
text-align:center;
padding:50px;
}

.container{
background:white;
max-width:600px;
margin:auto;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
color:#2c3e50;
}

p{
color:#555;
font-size:18px;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:6px;
background:#3498db;
color:white;
cursor:pointer;
}

button:hover{
background:#2980b9;
}
</style>

</head>
<body>

<div class="container">
<h1>Selamat Datang</h1>
<p>Selamat datang di sistem ujian matematika.</p>
<p>Silakan klik tombol di bawah untuk memulai ujian.</p>

<button onclick="mulaiUjian()">Mulai Ujian</button>
</div>

<script>
function mulaiUjian(){
alert("Fitur ujian akan segera tersedia.");
}
</script>
